<section class="relative lg:min-h-screen lg:grid lg:place-content-center overflow-hidden bg-[#FDFBF7] border-y-[8px] border-[#3D2B1F]">
    
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute inset-0 opacity-[0.03]" 
             style="background-image: radial-gradient(#3D2B1F 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
        
        <div class="absolute left-0 top-0 h-full w-3 bg-[#3D2B1F]"></div>
        <div class="absolute left-4 top-0 h-full w-px bg-[#A6894A]/30"></div>
    </div>

    <div class="relative mx-auto w-full max-w-7xl px-6 py-16 md:grid md:grid-cols-2 md:items-center md:gap-16 lg:px-12">

        <div class="max-w-prose space-y-8">
            <div class="space-y-4">
                <h1 class="font-serif text-6xl font-bold text-[#3D2B1F] leading-[1.1] lg:text-8xl">
                    Descubre tu <br />
                    <span class="text-[#1B3022]">próxima</span> <br />
                    <span class="italic font-light">lectura.</span>
                </h1>
                <div class="w-24 h-1.5 bg-[#A6894A]"></div>
            </div>

            <p class="text-lg text-[#3D2B1F]/80 font-serif leading-relaxed max-w-md">
                "Los libros son amigos que nunca fallan." Explora nuestra colección curada de clásicos y nuevas joyas literarias en el corazón de nuestra biblioteca digital.
            </p>

            <div class="flex flex-wrap gap-4 pt-4">
                <a href="/libros" 
                   class="group relative inline-flex items-center gap-3 bg-[#1B3022] text-white px-10 py-5 text-sm font-bold uppercase tracking-[0.2em] transition-all hover:bg-[#3D2B1F] border-b-4 border-[#A6894A]">
                    Explorar el Catálogo
                    <svg class="w-4 h-4 transition-transform group-hover:translate-x-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </a>
            </div>

            <div class="flex flex-wrap items-center gap-8 pt-8 border-t border-[#3D2B1F]/10">
                <div class="flex flex-col">
                    <span class="text-[#A6894A] font-bold text-lg">★★★★★</span>
                    <span class="text-[#3D2B1F] text-xs font-bold uppercase tracking-widest">+10k Lectores</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[#3D2B1F] font-bold text-lg">24h</span>
                    <span class="text-[#3D2B1F]/60 text-xs font-bold uppercase tracking-widest">Envío Express</span>
                </div>
            </div>
        </div>

        <div class="relative mt-20 md:mt-0 flex justify-center">
            <div class="relative p-4 bg-white border border-[#3D2B1F]/10 shadow-[20px_20px_0px_0px_rgba(61,43,31,0.05)]">
                
                <div class="relative w-full max-w-sm" *ngFor="let libro of libros()">
                    <div class="absolute -top-2 -left-2 w-10 h-10 border-t-4 border-l-4 border-[#A6894A] z-20"></div>
                    <div class="absolute -bottom-2 -right-2 w-10 h-10 border-b-4 border-r-4 border-[#A6894A] z-20"></div>

                    <img [src]="libro.imagen" [alt]="libro.titulo" 
                         class="relative w-full grayscale-[0.2] contrast-[1.1] hover:grayscale-0 transition-all duration-700 shadow-2xl" />

                    <div class="absolute -right-8 top-1/2 -translate-y-1/2 bg-[#3D2B1F] text-[#FDFBF7] p-4 rotate-90 origin-right border-l-4 border-[#A6894A]">
                        <p class="text-[10px] font-bold uppercase tracking-widest whitespace-nowrap">{{ libro.autor }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 hidden lg:block">
        <div class="flex flex-col items-center gap-2 opacity-40">
            <span class="text-[10px] uppercase tracking-[0.4em] text-[#3D2B1F] font-bold">Deslizar</span>
            <div class="w-px h-12 bg-[#3D2B1F]"></div>
        </div>
    </div>
</section>
