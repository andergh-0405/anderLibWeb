<!-- nav-bar.html -->
<nav class="relative bg-warmwhite/90 backdrop-blur-md shadow-sm border-b border-sage-pale sticky top-0 z-50">
  <div class="container px-6 py-3 mx-auto md:flex md:items-center md:justify-between">

    <!-- ── LOGO + HAMBURGER ── -->
    <div class="flex items-center justify-between">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2.5 group">

        <span class="font-serif text-xl font-semibold text-bark group-hover:text-leaf transition-colors duration-200">
          AnderLib
        </span>
      </a>

      <!-- Botón hamburger móvil -->
      <button (click)="toggleMenuMovil()"
        class="md:hidden p-2 rounded-lg text-stone hover:text-bark hover:bg-mint transition-all duration-200"
        aria-label="toggle menu">
        @if (!menuMovilAbierto) {
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 8h16M4 16h16" />
        </svg>
        } @else {
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
        }
      </button>
    </div>

    <!-- ── MENÚ PRINCIPAL ── -->
    <div class="transition-all duration-300 ease-in-out md:flex md:items-center md:justify-between md:flex-1 md:ml-10"
      [class.hidden]="!menuMovilAbierto" [class.block]="menuMovilAbierto">

      <!-- Links nav -->
      <div class="flex flex-col mt-3 gap-1 md:flex-row md:mt-0 md:gap-0 md:items-center">
        <a routerLink="/" routerLinkActive="!text-leaf !bg-mint" (click)="menuMovilAbierto = false" class="px-3 py-2 text-sm font-medium text-stone rounded-lg
                 hover:bg-mint hover:text-bark transition-colors duration-200 md:mx-1">
          Inicio
        </a>
        <a routerLink="/libros" routerLinkActive="!text-leaf !bg-mint" (click)="menuMovilAbierto = false" class="px-3 py-2 text-sm font-medium text-stone rounded-lg
                 hover:bg-mint hover:text-bark transition-colors duration-200 md:mx-1">
          Libros
        </a>
        <a routerLink="/contacto" routerLinkActive="!text-leaf !bg-mint" (click)="menuMovilAbierto = false" class="px-3 py-2 text-sm font-medium text-stone rounded-lg
                 hover:bg-mint hover:text-bark transition-colors duration-200 md:mx-1">
          Contacto
        </a>
      </div>

      <!-- Acciones: búsqueda + carrito + usuario -->
      <div class="flex flex-col gap-3 mt-4 md:flex-row md:mt-0 md:items-center md:gap-2">

        <!-- Buscador -->
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <svg class="w-4 h-4 text-stone/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </span>
          <input type="search" placeholder="Buscar libro..." class="w-full md:w-48 lg:w-56 py-2 pl-9 pr-4 text-sm text-bark bg-mint
                   border border-sage-pale rounded-full outline-none
                   placeholder-stone/50 transition-all duration-200
                   focus:border-sage focus:ring-2 focus:ring-sage/20 focus:bg-white focus:w-64" />
        </div>

        <button routerLink="/iniciarSesion"
          class="hidden md:block px-5 py-2 text-sm font-bold text-bark bg-mint border border-sage-pale rounded-full hover:bg-leaf  transition-all duration-300">
          Iniciar Sesión
        </button>

        <!-- Carrito -->
        <button routerLink="/carrito" class="relative p-2.5 text-stone hover:text-leaf rounded-xl hover:bg-mint
                 transition-all duration-200 w-fit" aria-label="Ver carrito">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          @if (cantidadCarrito > 0) {
          <span class="absolute -top-0.5 -right-0.5 bg-leaf text-white text-[10px] font-bold
                         rounded-full w-[18px] h-[18px] flex items-center justify-center shadow-sm">
            {{ cantidadCarrito }}
          </span>
          }
        </button>

        <!-- Avatar + Dropdown -->
        <div class="relative">
          <button type="button" (click)="toggleMenuUsuario()" class="flex items-center gap-2 pl-1 pr-3 py-1 rounded-full
                   border border-sage-pale bg-mint
                   hover:border-sage hover:bg-sage-pale/50
                   transition-all duration-200 group">
            <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&q=80&w=200"
              alt="Perfil"
              class="w-7 h-7 rounded-full object-cover ring-2 ring-sage-pale group-hover:ring-sage transition" />
            <span class="text-xs font-medium text-bark hidden lg:inline">Hola, Ana</span>
            <svg class="w-3.5 h-3.5 text-stone transition-transform duration-200"
              [class.rotate-180]="menuUsuarioAbierto" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <!-- Dropdown usuario -->
          @if (menuUsuarioAbierto) {
          <div class="absolute end-0 z-50 mt-2.5 w-56
                        bg-amber-200 border border-sage-pale rounded-2xl
                        shadow-xl shadow-bark/10 overflow-hidden
                        animate-[fadeIn_0.18s_ease_forwards]" role="menu">

            <div class="px-4 py-3 border-b border-sage-pale bg-mint/40">
              <p class="text-xs text-stone">Conectado como</p>
              <p class="text-sm font-semibold text-bark mt-0.5">Ana García</p>
            </div>

            <div class="p-2">
              <a routerLink="/perfil" (click)="toggleMenuUsuario()" role="menuitem" class="flex items-center gap-2.5 rounded-xl px-3 py-2 text-sm text-stone
                         hover:bg-mint hover:text-bark transition-colors duration-150">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                </svg>
                Mi Perfil
              </a>
              <a routerLink="/mis-pedidos" (click)="toggleMenuUsuario()" role="menuitem" class="flex items-center gap-2.5 rounded-xl px-3 py-2 text-sm text-stone
                         hover:bg-mint hover:text-bark transition-colors duration-150">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                Mis Pedidos
              </a>
              <!-- solo aparecer cuando el rol es admin <a routerLink="/dashboard" (click)="toggleMenuUsuario()" role="menuitem" class="flex items-center gap-2.5 rounded-xl px-3 py-2 text-sm text-stone
                         hover:bg-mint hover:text-bark transition-colors duration-150">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                </svg>
                Lista de Deseos
              </a> -->
            </div>

            <div class="p-2 border-t border-sage-pale">
              <button (click)="cerrarSesion()" role="menuitem" class="flex w-full items-center gap-2.5 rounded-xl px-3 py-2 text-sm
                         text-black hover:bg-red-500 hover:text-white transition-colors duration-150">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
                </svg>
                Cerrar Sesión
              </button>
            </div>
          </div>
          }
        </div>

      </div>
    </div>
  </div>
</nav>
