<!-- nav-bar.html -->
<nav class="relative bg-warmwhite/90 backdrop-blur-md shadow-sm border-b border-sage-pale sticky top-0 z-50">
  <div class="container px-6 py-3 mx-auto md:flex md:items-center md:justify-between">

    <!-- ── LOGO + HAMBURGER ── -->
    <div class="flex items-center justify-between">

      <a routerLink="/" class="flex items-center gap-2.5 group">
        <span class="font-serif text-xl font-semibold text-bark group-hover:text-leaf transition-colors duration-200">
          AnderLib
        </span>
      </a>

      <button (click)="toggleMenuMovil()"
        class="md:hidden p-2 rounded-lg text-stone hover:text-bark hover:bg-mint transition-all duration-200"
        aria-label="toggle menu">
        @if (!menuMovilAbierto) {
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 8h16M4 16h16" />
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        }
      </button>
    </div>

    <!-- ── MENÚ PRINCIPAL ── -->
    <div class="transition-all duration-300 ease-in-out md:flex md:items-center md:justify-between md:flex-1 md:ml-10"
      [class.hidden]="!menuMovilAbierto" [class.block]="menuMovilAbierto">

      <!-- Links nav -->
      <div class="flex flex-col mt-3 gap-1 md:flex-row md:mt-0 md:gap-0 md:items-center">
        <a routerLink="/" 
          (click)="menuMovilAbierto = false"
          class="px-3 py-2 text-sm font-medium text-stone rounded-lg
                 hover:bg-mint hover:text-bark transition-colors duration-200 md:mx-1">
          Inicio
        </a>
        <a routerLink="/libros" routerLinkActive="!text-leaf !bg-mint"
          (click)="menuMovilAbierto = false"
          class="px-3 py-2 text-sm font-medium text-stone rounded-lg
                 hover:bg-mint hover:text-bark transition-colors duration-200 md:mx-1">
          Libros
        </a>
        <a routerLink="/contacto" routerLinkActive="!text-leaf !bg-mint"
          (click)="menuMovilAbierto = false"
          class="px-3 py-2 text-sm font-medium text-stone rounded-lg
                 hover:bg-mint hover:text-bark transition-colors duration-200 md:mx-1">
          Contacto
        </a>
      </div>

      <!-- ── ACCIONES ── -->
      <div class="flex flex-col gap-3 mt-4 md:flex-row md:mt-0 md:items-center md:gap-2">

        <!-- Buscador -->
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <svg class="w-4 h-4 text-stone/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </span>
          <input type="search" placeholder="Buscar libro..."
            class="w-full md:w-48 lg:w-56 py-2 pl-9 pr-4 text-sm text-bark bg-mint
                   border border-sage-pale rounded-full outline-none placeholder-stone/50
                   transition-all duration-200 focus:border-sage focus:ring-2
                   focus:ring-sage/20 focus:bg-white md:focus:w-64" />
        </div>

        <!-- ── CONDICIÓN: logueado vs no logueado ── -->
        @if (usuarioActual()) {

          <!-- Carrito -->
          <button routerLink="/carrito"
            class="relative p-2.5 text-stone hover:text-leaf rounded-xl hover:bg-mint
                   transition-all duration-200 w-fit" aria-label="Ver carrito">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            @if (cantidadCarrito > 0) {
              <span class="absolute -top-0.5 -right-0.5 bg-leaf text-white text-[10px] font-bold
                           rounded-full w-[18px] h-[18px] flex items-center justify-center shadow-sm">
                {{ cantidadCarrito }}
              </span>
            }
          </button>

          <!-- Avatar + Dropdown -->
          <div class="relative" data-menu>

            <button type="button" (click)="toggleMenuUsuario()"
              class="flex items-center gap-2 pl-1 pr-3 py-1 rounded-full border border-sage-pale
                     bg-mint hover:border-sage hover:bg-sage-pale/50 transition-all duration-200 group">

              <!-- ✅ foto del usuario -->
              <img
                [src]="usuarioActual()!.foto"
                [alt]="usuarioActual()!.nombre"
                class="w-7 h-7 rounded-full object-cover ring-2 ring-sage-pale group-hover:ring-sage transition"/>

              <!-- ✅ primer nombre -->
              <span class="text-xs font-medium text-bark hidden lg:inline">
                Hola, {{ usuarioActual()!.nombre }}
              </span>

              <svg class="w-3.5 h-3.5 text-stone transition-transform duration-200"
                [class.rotate-180]="menuUsuarioAbierto"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            <!-- Dropdown -->
            @if (menuUsuarioAbierto) {
              <div class="absolute end-0 z-50 mt-2.5 w-60 bg-warmwhite border border-sage-pale
                           rounded-2xl shadow-xl shadow-bark/10 overflow-hidden" role="menu">

                <!-- Info usuario -->
                <div class="px-4 py-3 border-b border-sage-pale bg-mint/40 flex items-center gap-3">
                  <img
                    [src]="usuarioActual()!.foto"
                    [alt]="usuarioActual()!.nombre"
                    class="w-9 h-9 rounded-full object-cover ring-2 ring-sage-pale"/>
                  <div class="min-w-0">
                    <!-- ✅ nombre completo -->
                    <p class="text-sm font-semibold text-bark truncate">{{ usuarioActual()!.nombre}}</p>
                    <!-- ✅ correo -->
                    <p class="text-xs text-stone truncate">{{ usuarioActual()!.correo}}</p>
                  </div>
                </div>

                <div class="p-2">

                  <!-- ✅ Dashboard solo para ROLE_ADMIN -->
                  @if (usuarioActual()?.rol==='ROLE_ADMIN') {
                    <a routerLink="/dashboard" (click)="toggleMenuUsuario()" role="menuitem"
                      class="flex items-center gap-2.5 rounded-xl px-3 py-2 text-sm font-medium
                             text-leaf hover:bg-mint hover:text-bark transition-colors duration-150 mb-1">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
                      </svg>
                      Dashboard
                      <span class="ml-auto text-[10px] font-bold bg-leaf/15 text-leaf px-1.5 py-0.5 rounded-full">
                        Admin
                      </span>
                    </a>
                    <div class="mx-3 mb-1 h-px bg-sage-pale"></div>
                  }

                  <a routerLink="/perfil" (click)="toggleMenuUsuario()" role="menuitem"
                    class="flex items-center gap-2.5 rounded-xl px-3 py-2 text-sm text-stone
                           hover:bg-mint hover:text-bark transition-colors duration-150">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                    Mi Perfil
                  </a>

                  <a routerLink="/mis-pedidos" (click)="toggleMenuUsuario()" role="menuitem"
                    class="flex items-center gap-2.5 rounded-xl px-3 py-2 text-sm text-stone
                           hover:bg-mint hover:text-bark transition-colors duration-150">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    Mis Pedidos
                  </a>
                </div>

                <div class="p-2 border-t border-sage-pale">
                  <button (click)="cerrarSesion()" role="menuitem"
                    class="flex w-full items-center gap-2.5 rounded-xl px-3 py-2 text-sm
                           text-stone hover:bg-red-50 hover:text-red-500 transition-colors duration-150">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
                    </svg>
                    Cerrar Sesión
                  </button>
                </div>

              </div>
            }
          </div>

        } @else {

          <!-- NO LOGUEADO -->
          <a routerLink="/iniciarSesion"
            class="px-5 py-2 text-sm font-medium text-bark bg-mint border border-sage-pale
                   rounded-full hover:bg-leaf hover:text-white hover:border-leaf
                   transition-all duration-200">
            Iniciar Sesión
          </a>

        }

      </div>
    </div>
  </div>
</nav>
