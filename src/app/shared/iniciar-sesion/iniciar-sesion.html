<!-- ── CARD (estructura MerakiUI) ── -->
<div
    class="card flex w-full max-w-sm mx-auto overflow-hidden rounded-3xl shadow-2xl shadow-bark/15 lg:max-w-4xl border border-sage-pale/60">

    <!-- ── PANEL IZQUIERDO: imagen decorativa ── -->
    <div class="hidden lg:block lg:w-1/2 relative overflow-hidden grain"
        style="background: linear-gradient(160deg, #1C2E1A 0%, #2A3D28 55%, #1A2718 100%);">

        <!-- Imagen de fondo -->
        <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=800&q=75"
            class="absolute inset-0 w-full h-full object-cover mix-blend-soft-light opacity-20" alt="" />

        <!-- Línea dorada derecha -->
        <div class="absolute right-0 top-0 h-full w-[3px]"
            style="background: linear-gradient(180deg,transparent 5%,#D4A853 35%,#D4A853 65%,transparent 95%); opacity:.45;">
        </div>

        <!-- Blob verde -->
        <div class="absolute bottom-16 right-8 w-52 h-52 rounded-full opacity-[0.07]"
            style="background: radial-gradient(circle, #7A9E7E, transparent 70%)"></div>
        <div class="absolute top-1/4 -left-8 w-36 h-36 rounded-full opacity-[0.08]"
            style="background: radial-gradient(circle, #D4A853, transparent 70%)"></div>

        <!-- Contenido -->
        <div class="relative z-10 flex flex-col justify-between h-full p-10">

            <!-- Logo -->
            <a href="/" class="flex items-center gap-2.5">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center shadow-md">
                </div>
                <span class="font-serif text-xl font-semibold text-parchment"></span>
            </a>

            <!-- Quote -->
            <div class="space-y-6">
                <blockquote class="font-serif text-[1.65rem] leading-[1.35] font-medium text-parchment">
                    "Un lector vive mil vidas antes de morir."
                </blockquote>
                <p class="text-xs tracking-[.18em] uppercase text-parchment/40">— George R.R. Martin</p>
            </div>

        </div>
    </div>

    <!-- ── PANEL DERECHO: formulario ── -->
    <div class="w-full bg-warmwhite px-8 py-10 lg:w-1/2">

        <!-- Título -->
        <div class="mb-7">
            <span
                class="inline-flex items-center gap-2 text-[11px] font-medium tracking-[.15em] uppercase text-sage mb-3">
                <span class="w-5 h-px bg-sage-light"></span>Bienvenido de nuevo
            </span>
            <h1 class="font-serif text-[2.1rem] leading-none font-semibold text-bark">Iniciar sesión</h1>
            <p class="text-stone text-sm mt-2">Accede a tu biblioteca personal</p>
        </div>

        <!-- Email -->
        <div class="space-y-1.5 mb-4">
            <label class="text-[11px] font-semibold uppercase tracking-[.12em] text-bark">
                Correo electrónico
            </label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-stone/40 pointer-events-none">
                    <svg class="w-[17px] h-[17px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                    </svg>
                </span>
                <input type="email" placeholder="ana@ejemplo.com" required class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-cream border border-sage-pale text-sm text-bark
                   placeholder-stone/30 transition-all duration-200
                   focus:border-sage focus:ring-2 focus:ring-sage/20 focus:bg-white" />
            </div>
        </div>

        <!-- Contraseña -->
        <div class="space-y-1.5 mb-6">
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-stone/40 pointer-events-none">
                    <svg class="w-[17px] h-[17px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                </span>
                <input type="password" id="login-pwd" placeholder="Tu contraseña" required class="w-full pl-11 pr-12 py-3.5 rounded-2xl bg-cream border border-sage-pale text-sm text-bark
                   placeholder-stone/30 transition-all duration-200
                   focus:border-sage focus:ring-2 focus:ring-sage/20 focus:bg-white" />
                <button type="button" onclick=""
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-stone/40 hover:text-stone transition-colors">
                    <svg id="eye-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Botón submit -->
        <button type="submit" class="w-full flex items-center justify-center gap-2.5 px-6 py-3.5
               text-sm font-medium text-black bg-leaf rounded-2xl
               shadow-lg shadow-leaf/25 hover:bg-bark
               hover:-translate-y-0.5 hover:shadow-xl hover:shadow-leaf/20
               active:translate-y-0 transition-all duration-200 group">
            <span>Iniciar sesión</span>
            <svg class="w-4 h-4 transition-transform group-hover:translate-x-0.5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
        </button>

        <!-- Divider registro -->
        <div class="flex items-center gap-3 mt-6">
            <div class="flex-1 h-px bg-sage-pale"></div>
            <a href="/registrarse"
                class="text-xs text-stone/50 uppercase tracking-widest hover:text-leaf transition-colors">
                Crear nueva cuenta
            </a>
            <div class="flex-1 h-px bg-sage-pale"></div>
        </div>

    </div>
</div>
