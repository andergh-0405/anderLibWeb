<!-- register.component.html -->
<div class="flex items-center justify-center min-h-screen px-4 py-12 bg-cream relative overflow-hidden">

    <!-- Blobs de fondo -->
    <div class="absolute top-0 right-0 w-96 h-96 rounded-full pointer-events-none -translate-y-1/2 translate-x-1/3"
        style="background: radial-gradient(circle, rgba(122,158,126,.12), transparent 70%)"></div>
    <div class="absolute bottom-0 left-0 w-80 h-80 rounded-full pointer-events-none translate-y-1/2 -translate-x-1/3"
        style="background: radial-gradient(circle, rgba(61,97,66,.08), transparent 70%)"></div>

    <!-- Card -->
    <div
        class="flex w-full max-w-sm mx-auto overflow-hidden bg-warmwhite rounded-3xl shadow-2xl shadow-bark/10 lg:max-w-4xl border border-sage-pale">

        <!-- ── PANEL IZQUIERDO: Formulario ── -->
        <div class="w-full px-8 py-10 md:px-10 lg:w-1/2">

            <!-- Logo + título -->
            <div class="text-center mb-8">
                <a routerLink="/" class="inline-flex items-center gap-2 justify-center mb-4">
                    <div class="w-8 h-8 rounded-lg bg-leaf flex items-center justify-center shadow-sm shadow-leaf/25">
                        <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5A2.5 2.5 0 016.5 17H20" />
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" />
                        </svg>
                    </div>
                    <span class="font-serif text-2xl font-semibold text-bark">AnderLib</span>
                </a>
                <p class="font-serif text-2xl font-medium text-bark">Crea tu cuenta</p>
                <p class="text-xs text-stone mt-1">Únete a nuestra comunidad de lectores</p>
            </div>

            <!-- Formulario -->
            <form (ngSubmit)="registrarUsuario()" class="space-y-4">

                <!-- Nombre -->
                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold uppercase tracking-widest text-bark">
                        Nombre y Apellido
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-stone/40 pointer-events-none">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0" />
                            </svg>
                        </span>
                        <input [(ngModel)]="nuevoUsuario.nombre" name="nombre" type="text" placeholder="Anderson Guabil"
                            class="block w-full pl-11 pr-4 py-3 text-sm text-bark bg-cream border border-sage-pale
                     rounded-2xl placeholder-stone/30 outline-none transition-all duration-200
                     focus:border-sage focus:ring-2 focus:ring-sage/20 focus:bg-white" />
                    </div>
                </div>

                <!-- Correo -->
                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold uppercase tracking-widest text-bark">
                        Correo Electrónico
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-stone/40 pointer-events-none">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                            </svg>
                        </span>
                        <input [(ngModel)]="nuevoUsuario.correo" name="correo" type="email"
                            placeholder="ejemplo@correo.com" class="block w-full pl-11 pr-4 py-3 text-sm text-bark bg-cream border border-sage-pale
                     rounded-2xl placeholder-stone/30 outline-none transition-all duration-200
                     focus:border-sage focus:ring-2 focus:ring-sage/20 focus:bg-white" />
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold uppercase tracking-widest text-bark">
                        Contraseña
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-stone/40 pointer-events-none">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                            </svg>
                        </span>
                        <input [(ngModel)]="nuevoUsuario.contrasena" name="contrasena" type="password"
                            placeholder="··········" class="block w-full pl-11 pr-4 py-3 text-sm text-bark bg-cream border border-sage-pale
                     rounded-2xl placeholder-stone/30 outline-none transition-all duration-200
                     focus:border-sage focus:ring-2 focus:ring-sage/20 focus:bg-white" />
                    </div>
                </div>

                <!-- Foto URL -->
                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold uppercase tracking-widest text-bark">
                        Foto de perfil
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-stone/40 pointer-events-none">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244" />
                            </svg>
                        </span>
                        <input [(ngModel)]="nuevoUsuario.foto" name="foto" type="text"
                            placeholder="https://... (URL de tu foto)" class="block w-full pl-11 pr-4 py-3 text-sm text-bark bg-cream border border-sage-pale
                     rounded-2xl placeholder-stone/30 outline-none transition-all duration-200
                     focus:border-sage focus:ring-2 focus:ring-sage/20 focus:bg-white" />
                    </div>
                </div>

                <!-- Submit -->
                <button onclick="registrarUsuario()" type="submit" class="w-full flex items-center justify-center gap-2.5 mt-2 px-6 py-3.5
                 text-sm font-medium text-black bg-leaf rounded-2xl
                 shadow-lg shadow-leaf/25 hover:bg-bark
                 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-leaf/20
                 active:translate-y-0 transition-all duration-200 group">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
                    </svg>
                    Crear Cuenta
                    <svg class="w-4 h-4 transition-transform duration-200 group-hover:translate-x-0.5" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                    </svg>
                </button>

            </form>

            <!-- Link a login -->
            <div class="flex items-center gap-3 mt-6">
                <div class="flex-1 h-px bg-sage-pale"></div>
                <span class="text-xs text-stone/50 shrink-0">¿Ya tienes una cuenta?</span>
                <div class="flex-1 h-px bg-sage-pale"></div>
            </div>
            <a routerLink="/iniciarSesion" class="flex items-center justify-center gap-2 w-full mt-4 py-3 rounded-2xl
               border border-sage-pale text-sm font-medium text-bark
               hover:bg-mint hover:border-sage transition-all duration-200">
                Iniciar sesión
            </a>

        </div>

        <!-- ── PANEL DERECHO: Imagen ── -->
        <div class="hidden lg:block lg:w-1/2 relative overflow-hidden" style="background-image: url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?auto=format&fit=crop&w=1000&q=80');
             background-size: cover; background-position: center;">

            <!-- Overlay -->
            <div class="absolute inset-0"
                style="background: linear-gradient(160deg, rgba(28,46,26,.85) 0%, rgba(42,61,40,.7) 55%, rgba(26,39,24,.85) 100%);">
            </div>

            <!-- Línea dorada izquierda -->
            <div class="absolute left-0 top-0 h-full w-[3px]"
                style="background: linear-gradient(180deg,transparent 5%,#D4A853 35%,#D4A853 65%,transparent 95%); opacity:.5;">
            </div>

           
        </div>

    </div>
</div>
