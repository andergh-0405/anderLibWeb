<section class="w-full bg-[#FDFBF7] py-16 overflow-hidden border-b border-[#3D2B1F]/10">
    <div class="max-w-6xl mx-auto px-4">

        <div class="mb-16 text-center">
            <h2 class="font-serif text-4xl md:text-5xl font-bold text-[#3D2B1F] inline-block relative pb-6 tracking-tight">
                Títulos <span class="italic text-[#1B3022] font-light">Destacados</span>
                <span class="absolute bottom-1 left-0 right-0 h-[1px] bg-[#A6894A]"></span>
                <span class="absolute bottom-0 left-10 right-10 h-[3px] bg-[#3D2B1F]"></span>
            </h2>
        </div>

        <div class="flex overflow-x-auto snap-x snap-mandatory scroll-smooth scrollbar-hide gap-8 pb-8 -mx-4 px-4">

            @for (libro of libros().slice(0,8); track libro.id){
            <div class="flex-none w-[85%] md:w-[40%] lg:w-[30%] snap-center">
                <div class="bg-white border border-[#3D2B1F]/20 group transition-all duration-500 hover:border-[#A6894A]">
                    
                    <div class="relative h-80 md:h-[400px] overflow-hidden p-3 bg-[#F4F1EA]">
                        <img [src]="libro.imagen" [alt]="libro.titulo"
                            class="w-full h-full object-cover grayscale-[0.1] contrast-[1.05] transition-transform duration-700 group-hover:scale-105 shadow-md" />
                    </div>

                    <div class="p-6 bg-[#FDFBF7] border-t border-[#3D2B1F]/10">
                        <h3 class="font-serif text-xl font-bold text-[#3D2B1F] mb-1 truncate tracking-tight">
                            {{ libro.titulo }}
                        </h3>
                        <p class="text-[#3D2B1F]/60 font-serif italic text-sm mb-6">
                            Por <span class="text-[#3D2B1F] font-bold not-italic">{{ libro.autor }}</span>
                        </p>
                        
                        <button
                            class="w-full py-3 bg-[#1B3022] text-[#FDFBF7] text-xs font-bold uppercase tracking-[0.2em] transition-all duration-300 hover:bg-[#3D2B1F] border-b-2 border-[#A6894A] flex items-center justify-center gap-3">
                            Ver Detalles
                            <span class="w-4 h-px bg-[#A6894A]"></span>
                        </button>
                    </div>
                </div>
            </div>
            }@empty {
            <div class="col-span-full w-full flex flex-col items-center py-20 text-center">
                <p class="font-serif text-2xl italic text-[#3D2B1F]/40 tracking-widest">Colección no disponible</p>
            </div>
            }

        </div>

        <div class="flex justify-center items-center gap-3 mt-8 md:hidden">
            <div class="h-1 w-8 bg-[#1B3022]"></div>
            <div class="h-1 w-4 bg-[#3D2B1F]/20"></div>
            <div class="h-1 w-4 bg-[#3D2B1F]/20"></div>
        </div>

    </div>
</section>
