<section class="w-full bg-cream py-16 font-sans overflow-hidden">
    <div class="max-w-6xl mx-auto px-4">

        <!-- HEADER -->
        <div class="mb-12 text-center">


            <h2 class="font-serif text-4xl md:text-5xl font-semibold text-bark inline-block relative pb-5">
                Títulos <em class="italic text-leaf">Destacados</em>
                <span
                    class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-sage-light via-leaf to-sage rounded-full"></span>
            </h2>

        </div>

        <!-- CAROUSEL -->
        <div class="flex overflow-x-auto snap-x snap-mandatory scroll-smooth scrollbar-hide gap-6 pb-4 -mx-4 px-4">

            @for (libro of libros().slice(0,8); track libro.id){

            <div class="flex-none w-full md:w-[45%] lg:w-[31%] snap-center">
                <div class="bg-warmwhite rounded-2xl overflow-hidden border border-sage-pale
                    shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                    <div class="relative h-64 md:h-80 overflow-hidden bg-mint">
                        <img [src]="libro.imagen" [alt]="libro.titulo"
                            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                    </div>
                    <div class="p-6 bg-amber-200">
                        <h3 class="font-serif text-xl font-semibold text-bark mb-1 truncate">{{ libro.titulo }}</h3>
                        <p class="text-stone text-sm mb-5">
                            Por <span class="font-medium text-bark">{{ libro.autor }}</span>
                        </p>
                        <button
                            class="w-full flex items-center justify-center gap-2 bg-leaf text-black  py-2.5 rounded-xl text-sm font-medium
                           hover:bg-blue-400 transition-all duration-200 hover:shadow-md hover:text-white hover:shadow-leaf/20 group/btn">
                            Ver Detalles
                        </button>
                    </div>
                </div>
            </div>
            }@empty {
            <div class="col-span-full flex flex-col items-center py-20 text-center">
                <p class="font-serif text-xl text-bark">No hay libros disponibles</p>
                <p class="text-sm text-stone mt-1">Vuelve pronto, estamos actualizando la colección.</p>
            </div>
            }


        </div>

        <!-- DOT INDICATORS (mobile) -->
        <div class="flex justify-center items-center gap-2 mt-6 md:hidden">
            <div class="dot active h-1.5 rounded-full bg-leaf"></div>
            <div class="dot w-2 h-1.5 rounded-full bg-sage-pale"></div>
            <div class="dot w-2 h-1.5 rounded-full bg-sage-pale"></div>
            <div class="dot w-2 h-1.5 rounded-full bg-sage-pale"></div>
            <div class="dot w-2 h-1.5 rounded-full bg-sage-pale"></div>
        </div>

    </div>
</section>
