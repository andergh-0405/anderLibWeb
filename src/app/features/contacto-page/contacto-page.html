<section class="min-h-screen bg-[#FDFBF7] py-12 border-t-[6px] border-[#3D2B1F]">
    <div class="container px-6 py-12 mx-auto">
        <div class="lg:flex lg:items-center lg:-mx-10">
            
            <div class="lg:w-1/2 lg:mx-10">
                <h1 class="text-4xl font-serif font-bold text-[#3D2B1F] capitalize mb-2">
                    Contáctanos
                </h1>
                <div class="w-20 h-1 bg-[#A6894A] mb-6"></div>
                   <p class="mt-4 text-[#3D2B1F]/80 font-serif italic text-lg leading-relaxed">
                    "Donde habita el silencio, nace la respuesta." Escríbenos y nuestro equipo te ayudará pronto.
                </p>

                <form class="mt-12 space-y-6">
                    <div class="-mx-2 md:items-center md:flex">
                        <div class="flex-1 px-2">
                            <label class="block mb-2 text-[10px] font-bold uppercase tracking-[0.2em] text-[#3D2B1F]">
                                Nombre Completo
                            </label>
                            <input 
                                type="text" 
                                placeholder="Anderson Guabil" 
                                class="block w-full px-5 py-3 text-[#3D2B1F] bg-white border border-[#3D2B1F]/30 rounded-none focus:border-[#1B3022] focus:ring-1 focus:ring-[#1B3022] outline-none transition-all" />
                        </div>

                        <div class="flex-1 px-2 mt-4 md:mt-0">
                            <label class="block mb-2 text-[10px] font-bold uppercase tracking-[0.2em] text-[#3D2B1F]">
                                Correo Electrónico
                            </label>
                            <input 
                                type="email" 
                                placeholder="anderlib@ejemplo.com" 
                                class="block w-full px-5 py-3 text-[#3D2B1F] bg-white border border-[#3D2B1F]/30 rounded-none focus:border-[#1B3022] focus:ring-1 focus:ring-[#1B3022] outline-none transition-all" />
                        </div>
                    </div>

                    <div class="w-full">
                        <label class="block mb-2 text-[10px] font-bold uppercase tracking-[0.2em] text-[#3D2B1F]">
                            Tu Mensaje
                        </label>
                        <textarea 
                            class="block w-full h-32 px-5 py-3 text-[#3D2B1F] bg-white border border-[#3D2B1F]/30 rounded-none md:h-48 focus:border-[#1B3022] focus:ring-1 focus:ring-[#1B3022] outline-none transition-all resize-none" 
                            placeholder="Escribe tu consulta aquí..."></textarea>
                    </div>

                    <button 
                        type="submit"
                        class="w-full px-6 py-4 text-xs font-bold tracking-[0.3em] text-white uppercase transition-all bg-[#1B3022] rounded-none hover:bg-[#3D2B1F] active:scale-[0.98] border-b-4 border-[#A6894A]">
                        Enviar Mensaje
                    </button>
                </form>
            </div>

            <div class="mt-12 lg:flex lg:mt-0 lg:flex-col lg:items-center lg:w-1/2 lg:mx-10">
                
                <div class="relative hidden lg:block p-4 bg-white border border-[#3D2B1F]/10 shadow-xl">
                    <img class="relative object-cover mx-auto shrink-0 w-[28rem] h-80 grayscale-[0.3] sepia-[0.2]" 
                         src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?auto=format&fit=crop&w=800&q=80" 
                         alt="Biblioteca">
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-[#A6894A]"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-[#A6894A]"></div>
                </div>

                <div class="mt-12 space-y-10 w-full max-w-md">
                    
                    <div class="flex items-start">
                        <div class="text-[#A6894A] mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z" />
                            </svg>
                        </div>
                        <div class="ml-6">
                            <h4 class="text-[#3D2B1F] font-serif font-bold text-lg leading-tight uppercase tracking-tighter">Sede Central</h4>
                            <p class="text-[#3D2B1F]/60 text-sm font-serif italic">Av. Principal y Calle de los Libros, Quito.</p>
                        </div>
                    </div>

                    <div class="flex items-start">
                        <div class="text-[#A6894A] mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                        </div>
                        <div class="ml-6">
                            <h4 class="text-[#3D2B1F] font-serif font-bold text-lg uppercase tracking-tighter">Consultas</h4>
                            <p class="text-[#3D2B1F]/60 text-sm font-serif italic">(+593) 987-654-321</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
